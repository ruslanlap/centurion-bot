name: centurion-bot

services:
  bot:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: centurion-bot
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - bot-data:/app/data
    # Uncomment for webhook mode:
    # ports:
    #   - "8080:8080"

volumes:
  bot-data:
